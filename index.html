<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analog Watch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <h1>Analog Watch</h1>
    <button class="mode-toggle" id="mode-toggle" type="button" aria-pressed="false">
      Switch to Digital
    </button>

    <div class="watch" aria-label="Analog watch showing current time">
      <div class="center-dot"></div>

      <div class="hand hour-hand" id="hour-hand"></div>
      <div class="hand minute-hand" id="minute-hand"></div>
      <div class="hand second-hand" id="second-hand"></div>

      <div class="numbers" aria-hidden="true">
        <span class="num n1">1</span>
        <span class="num n2">2</span>
        <span class="num n3">3</span>
        <span class="num n4">4</span>
        <span class="num n5">5</span>
        <span class="num n6">6</span>
        <span class="num n7">7</span>
        <span class="num n8">8</span>
        <span class="num n9">9</span>
        <span class="num n10">10</span>
        <span class="num n11">11</span>
        <span class="num n12">12</span>
      </div>

      <div class="mark mark-12"></div>
      <div class="mark mark-3"></div>
      <div class="mark mark-6"></div>
      <div class="mark mark-9"></div>
    </div>

    <p class="digital" id="digital-time">00:00:00</p>
    <p class="date-display" id="date-display">Sunday, 15 March 2026</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
